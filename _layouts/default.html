<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" sizes="any" href="{{ '/assets/images/favicon-32.svg' | relative_url }}">
  <link rel="icon" type="image/svg+xml" sizes="16x16" href="{{ '/assets/images/favicon-16.svg' | relative_url }}">
  <link rel="apple-touch-icon" href="{{ '/assets/images/apple-touch-icon.svg' | relative_url }}">
  <meta name="theme-color" content="#6366f1">
  <meta name="msapplication-TileColor" content="#6366f1">
  <link rel="manifest" href="{{ '/site.webmanifest' | relative_url }}">
  <meta name="msapplication-config" content="{{ '/browserconfig.xml' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"></noscript>
  <link rel="canonical" href="{{ page.url | absolute_url }}">
  <link rel="sitemap" type="application/xml" href="{{ '/sitemap.xml' | relative_url }}">
  {% seo %}
  <!-- Open Graph / Twitter Card Image -->
  <meta property="og:image" content="{{ '/assets/images/og-share.jpg' | absolute_url }}">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="{{ '/assets/images/og-share.jpg' | absolute_url }}">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Extrodata",
    "url": "{{ site.url }}",
    "logo": "{{ '/assets/images/logo.svg' | absolute_url }}",
    "description": "{{ site.description }}",
    "email": "{{ site.email }}",
    "address": {
      "@type": "PostalAddress",
      "addressLocality": "London",
      "addressCountry": "GB"
    },
    "sameAs": [
      "https://linkedin.com/company/extrodata",
      "https://twitter.com/extrodata"
    ]
  }
  </script>
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}?v={{ 'now' | date: '%s' }}">
  <noscript>
    <style>
      .reveal, .reveal-up, .reveal-left, .reveal-right, .reveal-stagger {
        opacity: 1 !important;
        transform: none !important;
      }
    </style>
  </noscript>
</head>

<body>
  <a class="skip-link" href="#main-content">Skip to content</a>

  {% include header.html %}

  <main id="main-content">
    {{ content }}
  </main>

  {% include footer.html %}
{% include cookie-consent.html %}

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
  <script src="{{ '/assets/js/main.js' | relative_url }}" defer></script>
</body>
</html>
