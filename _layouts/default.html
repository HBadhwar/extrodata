<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" sizes="any" href="/assets/images/favicon-32.svg">
  <link rel="icon" type="image/svg+xml" sizes="16x16" href="/assets/images/favicon-16.svg">
  <link rel="apple-touch-icon" href="/assets/images/apple-touch-icon.svg">
  <meta name="theme-color" content="#6366f1">
  <meta name="msapplication-TileColor" content="#6366f1">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="msapplication-config" content="/browserconfig.xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="canonical" href="{{ page.url | absolute_url }}">
  <link rel="sitemap" type="application/xml" href="/sitemap.xml">
  {% seo %}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Extrodata",
    "url": "{{ site.url }}",
    "logo": "{{ site.url }}/assets/images/logo.svg",
    "description": "{{ site.description }}",
    "email": "{{ site.email }}",
    "address": {
      "@type": "PostalAddress",
      "addressLocality": "London",
      "addressCountry": "GB"
    },
    "sameAs": [
      "https://linkedin.com/company/extrodata",
      "https://twitter.com/extrodata"
    ]
  }
  </script>
  <link rel="stylesheet" href="/assets/css/main.css">
</head>

<body>
  <a class="skip-link" href="#main-content">Skip to content</a>

  {% include header.html %}

  <main id="main-content">
    {{ content }}
  </main>

  {% include footer.html %}
{% include cookie-consent.html %}

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="/assets/js/main.js" defer></script>
</body>
</html>
