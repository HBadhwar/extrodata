layout: default

{% if page.hero_title %}
<div class="page-hero container">
  <h1 class="page-hero__title reveal">{{ page.hero_title }}</h1>
  {% if page.hero_subtitle %}
  <p class="page-hero__subtitle reveal">{{ page.hero_subtitle }}</p>
  {% endif %}
</div>
{% endif %}

<div class="container">
  {{ content }}
</div>
