<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e17"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <linearGradient id="ga4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8710a"/>
      <stop offset="100%" style="stop-color:#f4b400"/>
    </linearGradient>
    <linearGradient id="bq" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16c0e8"/>
      <stop offset="100%" style="stop-color:#4285f4"/>
    </linearGradient>
    <linearGradient id="gard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#29b6f6"/>
      <stop offset="100%" style="stop-color:#0288d1"/>
    </linearGradient>
    <linearGradient id="sf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f2a900"/>
      <stop offset="100%" style="stop-color:#e8710a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="30" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient glow -->
  <circle cx="200" cy="315" r="120" fill="url(#ga4)" opacity="0.06" filter="url(#glow)"/>
  <circle cx="600" cy="315" r="120" fill="url(#gard)" opacity="0.06" filter="url(#glow)"/>
  <circle cx="1000" cy="315" r="120" fill="url(#sf)" opacity="0.06" filter="url(#glow)"/>

  <!-- Flow line -->
  <path d="M 180 315 L 420 315" stroke="rgba(255,255,255,0.06)" stroke-width="2" stroke-dasharray="8,6"/>
  <path d="M 540 315 L 780 315" stroke="rgba(255,255,255,0.06)" stroke-width="2" stroke-dasharray="8,6"/>
  <path d="M 900 315 L 1020 315" stroke="rgba(255,255,255,0.06)" stroke-width="2" stroke-dasharray="8,6"/>

  <!-- GA4 Node -->
  <circle cx="180" cy="315" r="52" fill="#1a1f2e" stroke="url(#ga4)" stroke-width="2.5"/>
  <circle cx="180" cy="315" r="36" fill="url(#ga4)" opacity="0.15"/>
  <circle cx="180" cy="315" r="18" fill="url(#ga4)" opacity="0.7"/>

  <!-- BigQuery Node -->
  <circle cx="480" cy="315" r="52" fill="#1a1f2e" stroke="url(#bq)" stroke-width="2.5"/>
  <circle cx="480" cy="315" r="36" fill="url(#bq)" opacity="0.15"/>
  <circle cx="480" cy="315" r="18" fill="url(#bq)" opacity="0.7"/>

  <!-- GARD Node -->
  <circle cx="660" cy="315" r="52" fill="#1a1f2e" stroke="url(#gard)" stroke-width="2.5"/>
  <circle cx="660" cy="315" r="36" fill="url(#gard)" opacity="0.15"/>
  <circle cx="660" cy="315" r="18" fill="url(#gard)" opacity="0.7"/>

  <!-- Snowflake Node -->
  <circle cx="1020" cy="315" r="52" fill="#1a1f2e" stroke="url(#sf)" stroke-width="2.5"/>
  <circle cx="1020" cy="315" r="36" fill="url(#sf)" opacity="0.15"/>
  <g transform="translate(1020,315)">
    <line x1="0" y1="-14" x2="0" y2="14" stroke="#f2a900" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-10" y1="-7" x2="10" y2="7" stroke="#f2a900" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-10" y1="7" x2="10" y2="-7" stroke="#f2a900" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Arrow heads -->
  <polygon points="430,311 442,315 430,319" fill="rgba(255,255,255,0.2)"/>
  <polygon points="790,311 802,315 790,319" fill="rgba(255,255,255,0.2)"/>
  <polygon points="1030,311 1042,315 1030,319" fill="rgba(255,255,255,0.2)"/>

  <!-- Small orbiting dots -->
  <circle cx="180" cy="240" r="4" fill="#e8710a" opacity="0.4"/>
  <circle cx="130" cy="360" r="3" fill="#f4b400" opacity="0.3"/>
  <circle cx="480" cy="245" r="4" fill="#16c0e8" opacity="0.4"/>
  <circle cx="530" cy="370" r="3" fill="#4285f4" opacity="0.3"/>
  <circle cx="660" cy="240" r="4" fill="#29b6f6" opacity="0.4"/>
  <circle cx="610" cy="370" r="3" fill="#0288d1" opacity="0.3"/>
  <circle cx="1020" cy="245" r="4" fill="#f2a900" opacity="0.4"/>
  <circle cx="970" cy="365" r="3" fill="#e8710a" opacity="0.3"/>

  <!-- Grid dots -->
  <g fill="rgba(255,255,255,0.03)">
    <circle cx="100" cy="100" r="1.5"/><circle cx="200" cy="100" r="1.5"/><circle cx="300" cy="100" r="1.5"/>
    <circle cx="400" cy="100" r="1.5"/><circle cx="500" cy="100" r="1.5"/><circle cx="600" cy="100" r="1.5"/>
    <circle cx="700" cy="100" r="1.5"/><circle cx="800" cy="100" r="1.5"/><circle cx="900" cy="100" r="1.5"/>
    <circle cx="1000" cy="100" r="1.5"/><circle cx="1100" cy="100" r="1.5"/>
    <circle cx="100" cy="200" r="1.5"/><circle cx="200" cy="200" r="1.5"/><circle cx="300" cy="200" r="1.5"/>
    <circle cx="400" cy="200" r="1.5"/><circle cx="500" cy="200" r="1.5"/><circle cx="600" cy="200" r="1.5"/>
    <circle cx="700" cy="200" r="1.5"/><circle cx="800" cy="200" r="1.5"/><circle cx="900" cy="200" r="1.5"/>
    <circle cx="1000" cy="200" r="1.5"/><circle cx="1100" cy="200" r="1.5"/>
    <circle cx="100" cy="400" r="1.5"/><circle cx="200" cy="400" r="1.5"/><circle cx="300" cy="400" r="1.5"/>
    <circle cx="400" cy="400" r="1.5"/><circle cx="500" cy="400" r="1.5"/><circle cx="600" cy="400" r="1.5"/>
    <circle cx="700" cy="400" r="1.5"/><circle cx="800" cy="400" r="1.5"/><circle cx="900" cy="400" r="1.5"/>
    <circle cx="1000" cy="400" r="1.5"/><circle cx="1100" cy="400" r="1.5"/>
    <circle cx="100" cy="500" r="1.5"/><circle cx="200" cy="500" r="1.5"/><circle cx="300" cy="500" r="1.5"/>
    <circle cx="400" cy="500" r="1.5"/><circle cx="500" cy="500" r="1.5"/><circle cx="600" cy="500" r="1.5"/>
    <circle cx="700" cy="500" r="1.5"/><circle cx="800" cy="500" r="1.5"/><circle cx="900" cy="500" r="1.5"/>
    <circle cx="1000" cy="500" r="1.5"/><circle cx="1100" cy="500" r="1.5"/>
  </g>
</svg>
