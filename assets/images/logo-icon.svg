<!-- Extrodata Icon Mark - Standalone symbol for favicon/app icon -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 50" width="50" height="50">
  <defs>
    <linearGradient id="icon-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="25" cy="25" r="24" fill="url(#icon-gradient)"/>
  
  <!-- Inner "E" / data flow lines (white) -->
  <path d="M15 18 L28 18 M15 25 L32 25 M15 32 L28 32" 
        fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Connection dots -->
  <circle cx="28" cy="18" r="2" fill="#ffffff"/>
  <circle cx="32" cy="25" r="2" fill="#ffffff"/>
  <circle cx="28" cy="32" r="2" fill="#ffffff"/>
</svg>
