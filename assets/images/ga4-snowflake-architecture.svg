<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e17"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <linearGradient id="ga4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8710a"/>
      <stop offset="100%" style="stop-color:#f4b400"/>
    </linearGradient>
    <linearGradient id="bq" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16c0e8"/>
      <stop offset="100%" style="stop-color:#4285f4"/>
    </linearGradient>
    <linearGradient id="gard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#29b6f6"/>
      <stop offset="100%" style="stop-color:#0288d1"/>
    </linearGradient>
    <linearGradient id="sf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f2a900"/>
      <stop offset="100%" style="stop-color:#e8710a"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="600" y="48" text-anchor="middle" fill="#fff" font-family="system-ui,sans-serif" font-size="20" font-weight="700">GA4 Raw Data to Snowflake via GARD Connector</text>

  <!-- GA4 Box -->
  <g filter="url(#shadow)">
    <rect x="60" y="100" width="200" height="140" rx="14" fill="#1a1f2e" stroke="rgba(232,113,10,0.3)" stroke-width="1.5"/>
    <rect x="60" y="100" width="200" height="5" rx="2.5" fill="url(#ga4)"/>
  </g>
  <circle cx="110" cy="140" r="20" fill="url(#ga4)" opacity="0.9"/>
  <text x="110" y="145" text-anchor="middle" fill="#fff" font-family="system-ui,sans-serif" font-size="14" font-weight="800">G4</text>
  <text x="145" y="138" fill="#fff" font-family="system-ui,sans-serif" font-size="14" font-weight="600">Google Analytics 4</text>
  <text x="145" y="156" fill="rgba(255,255,255,0.5)" font-family="system-ui,sans-serif" font-size="10">Event-level tracking</text>
  <g transform="translate(80,175)">
    <rect x="0" y="0" width="160" height="18" rx="4" fill="rgba(232,113,10,0.08)" stroke="rgba(232,113,10,0.15)" stroke-width="0.5"/>
    <text x="8" y="13" fill="rgba(255,255,255,0.6)" font-family="monospace" font-size="9">page_view</text>
    <rect x="0" y="22" width="160" height="18" rx="4" fill="rgba(232,113,10,0.08)" stroke="rgba(232,113,10,0.15)" stroke-width="0.5"/>
    <text x="8" y="35" fill="rgba(255,255,255,0.6)" font-family="monospace" font-size="9">purchase</text>
  </g>

  <!-- Arrow GA4->BQ -->
  <line x1="260" y1="170" x2="340" y2="170" stroke="#e8710a" stroke-width="2" stroke-dasharray="5,4"/>
  <polygon points="340,166 350,170 340,174" fill="#e8710a"/>
  <text x="300" y="162" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-family="system-ui,sans-serif" font-size="8">BigQuery Link</text>

  <!-- BigQuery Box -->
  <g filter="url(#shadow)">
    <rect x="360" y="100" width="200" height="140" rx="14" fill="#1a1f2e" stroke="rgba(22,192,232,0.3)" stroke-width="1.5"/>
    <rect x="360" y="100" width="200" height="5" rx="2.5" fill="url(#bq)"/>
  </g>
  <circle cx="410" cy="140" r="20" fill="url(#bq)" opacity="0.9"/>
  <text x="410" y="145" text-anchor="middle" fill="#fff" font-family="system-ui,sans-serif" font-size="12" font-weight="800">BQ</text>
  <text x="445" y="138" fill="#fff" font-family="system-ui,sans-serif" font-size="14" font-weight="600">BigQuery</text>
  <text x="445" y="156" fill="rgba(255,255,255,0.5)" font-family="system-ui,sans-serif" font-size="10">Raw data export</text>
  <g transform="translate(380,175)">
    <rect x="0" y="0" width="160" height="18" rx="4" fill="rgba(22,192,232,0.08)" stroke="rgba(22,192,232,0.15)" stroke-width="0.5"/>
    <text x="8" y="13" fill="rgba(255,255,255,0.6)" font-family="monospace" font-size="9">events_YYYYMMDD</text>
    <rect x="0" y="22" width="160" height="18" rx="4" fill="rgba(22,192,232,0.08)" stroke="rgba(22,192,232,0.15)" stroke-width="0.5"/>
    <text x="8" y="35" fill="rgba(255,255,255,0.6)" font-family="monospace" font-size="9">events_intraday_...</text>
  </g>

  <!-- Arrow BQ->GARD -->
  <line x1="560" y1="170" x2="640" y2="170" stroke="#4285f4" stroke-width="2" stroke-dasharray="5,4"/>
  <polygon points="640,166 650,170 640,174" fill="#4285f4"/>
  <text x="600" y="162" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-family="system-ui,sans-serif" font-size="8">Storage API</text>

  <!-- GARD Box -->
  <g filter="url(#shadow)">
    <rect x="660" y="100" width="200" height="140" rx="14" fill="#1a1f2e" stroke="rgba(41,182,246,0.3)" stroke-width="1.5"/>
    <rect x="660" y="100" width="200" height="5" rx="2.5" fill="url(#gard)"/>
  </g>
  <circle cx="710" cy="140" r="20" fill="url(#gard)" opacity="0.9"/>
  <text x="710" y="145" text-anchor="middle" fill="#fff" font-family="system-ui,sans-serif" font-size="10" font-weight="800">GARD</text>
  <text x="745" y="138" fill="#fff" font-family="system-ui,sans-serif" font-size="14" font-weight="600">GARD Connector</text>
  <text x="745" y="156" fill="rgba(255,255,255,0.5)" font-family="system-ui,sans-serif" font-size="10">Snowflake Marketplace</text>
  <g transform="translate(680,175)">
    <rect x="0" y="0" width="160" height="18" rx="4" fill="rgba(41,182,246,0.08)" stroke="rgba(41,182,246,0.15)" stroke-width="0.5"/>
    <text x="8" y="13" fill="rgba(255,255,255,0.6)" font-family="system-ui,sans-serif" font-size="9">Incremental loads</text>
    <rect x="0" y="22" width="160" height="18" rx="4" fill="rgba(41,182,246,0.08)" stroke="rgba(41,182,246,0.15)" stroke-width="0.5"/>
    <text x="8" y="35" fill="rgba(255,255,255,0.6)" font-family="system-ui,sans-serif" font-size="9">Auto schema mapping</text>
  </g>

  <!-- Arrow GARD->SF -->
  <line x1="860" y1="170" x2="940" y2="170" stroke="#f2a900" stroke-width="2" stroke-dasharray="5,4"/>
  <polygon points="940,166 950,170 940,174" fill="#f2a900"/>
  <text x="900" y="162" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-family="system-ui,sans-serif" font-size="8">Ingest</text>

  <!-- Snowflake Box -->
  <g filter="url(#shadow)">
    <rect x="960" y="100" width="180" height="140" rx="14" fill="#1a1f2e" stroke="rgba(242,169,0,0.3)" stroke-width="1.5"/>
    <rect x="960" y="100" width="180" height="5" rx="2.5" fill="url(#sf)"/>
  </g>
  <g transform="translate(1010,140)">
    <line x1="0" y1="-16" x2="0" y2="16" stroke="#f2a900" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-14" y1="-8" x2="14" y2="8" stroke="#f2a900" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-14" y1="8" x2="14" y2="-8" stroke="#f2a900" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <text x="1050" y="138" fill="#fff" font-family="system-ui,sans-serif" font-size="14" font-weight="600">Snowflake</text>
  <text x="1050" y="156" fill="rgba(255,255,255,0.5)" font-family="system-ui,sans-serif" font-size="10">Warehouse &amp; Views</text>
  <g transform="translate(980,175)">
    <rect x="0" y="0" width="140" height="18" rx="4" fill="rgba(242,169,0,0.08)" stroke="rgba(242,169,0,0.15)" stroke-width="0.5"/>
    <text x="8" y="13" fill="rgba(255,255,255,0.6)" font-family="monospace" font-size="9">ANALYTICS_12345</text>
    <rect x="0" y="22" width="140" height="18" rx="4" fill="rgba(34,197,94,0.08)" stroke="rgba(34,197,94,0.15)" stroke-width="0.5"/>
    <text x="8" y="35" fill="rgba(255,255,255,0.6)" font-family="monospace" font-size="9">...__VIEW (flattened)</text>
  </g>

  <!-- Downstream section -->
  <text x="600" y="310" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-family="system-ui,sans-serif" font-size="14" font-weight="600">Downstream Analytics</text>
  <line x1="400" y1="320" x2="800" y2="320" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- ROAS Card -->
  <g filter="url(#shadow)">
    <rect x="60" y="340" width="260" height="120" rx="14" fill="#1a1f2e" stroke="rgba(59,130,246,0.2)" stroke-width="1"/>
  </g>
  <rect x="75" y="355" width="40" height="40" rx="10" fill="rgba(59,130,246,0.15)"/>
  <text x="95" y="381" text-anchor="middle" fill="#3b82f6" font-family="system-ui,sans-serif" font-size="18">S</text>
  <text x="128" y="372" fill="#fff" font-family="system-ui,sans-serif" font-size="14" font-weight="600">ROAS Dashboards</text>
  <text x="128" y="390" fill="rgba(255,255,255,0.4)" font-family="system-ui,sans-serif" font-size="10">Looker / Tableau / Power BI</text>
  <g transform="translate(75,405)">
    <rect x="0" y="0" width="230" height="16" rx="3" fill="rgba(59,130,246,0.06)"/>
    <text x="8" y="12" fill="rgba(255,255,255,0.5)" font-family="system-ui,sans-serif" font-size="9">Campaign-level revenue attribution</text>
    <rect x="0" y="20" width="230" height="16" rx="3" fill="rgba(59,130,246,0.06)"/>
    <text x="8" y="32" fill="rgba(255,255,255,0.5)" font-family="system-ui,sans-serif" font-size="9">Ad spend reconciliation</text>
  </g>

  <!-- Attribution Card -->
  <g filter="url(#shadow)">
    <rect x="350" y="340" width="260" height="120" rx="14" fill="#1a1f2e" stroke="rgba(16,185,129,0.2)" stroke-width="1"/>
  </g>
  <rect x="365" y="355" width="40" height="40" rx="10" fill="rgba(16,185,129,0.15)"/>
  <text x="385" y="381" text-anchor="middle" fill="#10b981" font-family="system-ui,sans-serif" font-size="18">A</text>
  <text x="418" y="372" fill="#fff" font-family="system-ui,sans-serif" font-size="14" font-weight="600">Attribution Models</text>
  <text x="418" y="390" fill="rgba(255,255,255,0.4)" font-family="system-ui,sans-serif" font-size="10">Multi-touch &amp; incrementality</text>
  <g transform="translate(365,405)">
    <rect x="0" y="0" width="230" height="16" rx="3" fill="rgba(16,185,129,0.06)"/>
    <text x="8" y="12" fill="rgba(255,255,255,0.5)" font-family="system-ui,sans-serif" font-size="9">Last-touch &amp; position-based models</text>
    <rect x="0" y="20" width="230" height="16" rx="3" fill="rgba(16,185,129,0.06)"/>
    <text x="8" y="32" fill="rgba(255,255,255,0.5)" font-family="system-ui,sans-serif" font-size="9">Holdout group analysis</text>
  </g>

  <!-- ML Card -->
  <g filter="url(#shadow)">
    <rect x="640" y="340" width="260" height="120" rx="14" fill="#1a1f2e" stroke="rgba(168,85,247,0.2)" stroke-width="1"/>
  </g>
  <rect x="655" y="355" width="40" height="40" rx="10" fill="rgba(168,85,247,0.15)"/>
  <text x="675" y="381" text-anchor="middle" fill="#a855f7" font-family="system-ui,sans-serif" font-size="18">M</text>
  <text x="708" y="372" fill="#fff" font-family="system-ui,sans-serif" font-size="14" font-weight="600">ML Features</text>
  <text x="708" y="390" fill="rgba(255,255,255,0.4)" font-family="system-ui,sans-serif" font-size="10">CLV / Churn / Conversion</text>
  <g transform="translate(655,405)">
    <rect x="0" y="0" width="230" height="16" rx="3" fill="rgba(168,85,247,0.06)"/>
    <text x="8" y="12" fill="rgba(255,255,255,0.5)" font-family="system-ui,sans-serif" font-size="9">Customer lifetime value modelling</text>
    <rect x="0" y="20" width="230" height="16" rx="3" fill="rgba(168,85,247,0.06)"/>
    <text x="8" y="32" fill="rgba(255,255,255,0.5)" font-family="system-ui,sans-serif" font-size="9">Conversion probability scoring</text>
  </g>

  <!-- CDP Card -->
  <g filter="url(#shadow)">
    <rect x="930" y="340" width="210" height="120" rx="14" fill="#1a1f2e" stroke="rgba(245,158,11,0.2)" stroke-width="1"/>
  </g>
  <rect x="945" y="355" width="40" height="40" rx="10" fill="rgba(245,158,11,0.15)"/>
  <text x="965" y="381" text-anchor="middle" fill="#f59e0b" font-family="system-ui,sans-serif" font-size="18">C</text>
  <text x="998" y="372" fill="#fff" font-family="system-ui,sans-serif" font-size="14" font-weight="600">CDP Activation</text>
  <text x="998" y="390" fill="rgba(255,255,255,0.4)" font-family="system-ui,sans-serif" font-size="10">Segment / RudderStack</text>
  <g transform="translate(945,405)">
    <rect x="0" y="0" width="180" height="16" rx="3" fill="rgba(245,158,11,0.06)"/>
    <text x="8" y="12" fill="rgba(255,255,255,0.5)" font-family="system-ui,sans-serif" font-size="9">Cart abandonment flows</text>
    <rect x="0" y="20" width="180" height="16" rx="3" fill="rgba(245,158,11,0.06)"/>
    <text x="8" y="32" fill="rgba(255,255,255,0.5)" font-family="system-ui,sans-serif" font-size="9">Real-time audience segments</text>
  </g>

  <!-- Bottom branding -->
  <text x="600" y="530" text-anchor="middle" fill="rgba(255,255,255,0.15)" font-family="system-ui,sans-serif" font-size="12" font-weight="500">extrodata.com</text>
</svg>
