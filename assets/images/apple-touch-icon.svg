<!-- Extrodata Apple Touch Icon / PWA Icon - 180x180 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <defs>
    <linearGradient id="touch-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  
  <!-- Background with rounded corners -->
  <rect width="180" height="180" rx="40" fill="url(#touch-gradient)"/>
  
  <!-- Inner "E" / data flow lines -->
  <path d="M50 65 L95 65 M50 90 L110 90 M50 115 L95 115" 
        fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Connection dots -->
  <circle cx="95" cy="65" r="5" fill="#ffffff"/>
  <circle cx="110" cy="90" r="5" fill="#ffffff"/>
  <circle cx="95" cy="115" r="5" fill="#ffffff"/>
</svg>
