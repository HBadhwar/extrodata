<!-- Extrodata Primary Logo - Horizontal layout with icon mark -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 50" width="400" height="50">
  <defs>
    <linearGradient id="logo-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  
  <!-- Icon Mark: Abstract data node / "E" shape -->
  <g transform="translate(0, 5)">
    <!-- Outer hexagon frame -->
    <path d="M25 0 L47.3 12.5 L47.3 37.5 L25 50 L2.7 37.5 L2.7 12.5 Z" 
          fill="none" stroke="url(#logo-gradient)" stroke-width="3"/>
    
    <!-- Inner "E" / data flow lines -->
    <path d="M15 15 L30 15 M15 25 L35 25 M15 35 L30 35" 
          fill="none" stroke="url(#logo-gradient)" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Connection dots -->
    <circle cx="30" cy="15" r="2.5" fill="#6366f1"/>
    <circle cx="35" cy="25" r="2.5" fill="#7c3aed"/>
    <circle cx="30" cy="35" r="2.5" fill="#8b5cf6"/>
  </g>
  
  <!-- Wordmark -->
  <text x="65" y="34" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" 
        font-size="28" font-weight="700" fill="currentColor">
    <tspan fill="url(#logo-gradient)">Extro</tspan><tspan fill="currentColor">data</tspan>
  </text>
</svg>
