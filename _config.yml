title: Extrodata
description: "Extraordinary Data Insights — AI & Data consulting for the enterprise."
baseurl: ""
url: "https://extrodata.com"
email: enquiries@extrodata.com
twitter_username: extrodata
linkedin_username: extrodata

# Social media / Open Graph
social:
  name: Extrodata
  links:
    - https://linkedin.com/company/extrodata
    - https://twitter.com/extrodata

# Open Graph / Twitter Card image (1200x630 recommended)
og_image: "/assets/images/og-share.jpg"

# SEO settings
seo:
  tag_type: website

# Allow future-dated posts during development
future: true

# Permalink structure for blog posts
permalink: /insights/:year/:month/:day/:title.html

collections:
  pages:
    output: true
    permalink: /:title/

defaults:
  - scope:
      path: ""
      type: "any"
    values:
      og_image: "/assets/images/og-share.jpg"
  - scope:
      path: "_pages"
      type: "pages"
    values:
      layout: "page"
  - scope:
      path: "_posts"
      type: "posts"
    values:
      layout: "post"

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

sass:
  style: compressed

exclude:
  - .devcontainer/
  - .opencode/
  - opencode.json
  - .env
  - .jekyll-cache/
  - _site/
  - node_modules/
  - Gemfile
  - Gemfile.lock
